<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Adventure | מרכז למידה</title>
    <link rel="icon" type="image/png" href="WA-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; transition: background 0.3s, color 0.3s; }
        /* ביטול משקל עודף לפונט האנגלי כי הוא עבה טבעית */
        .eng-text { font-family: 'Fredoka One', cursive; font-weight: 400 !important; } 
        .text-wa-yellow { color: #FFD700; }
        
        /* מצב לילה */
        .night-mode { background-color: #0f172a !important; color: #f8fafc !important; }
        .night-mode .bg-white { background-color: #1e293b !important; color: #f8fafc !important; }
        .night-mode .bg-slate-50 { background-color: #0f172a !important; }
        
        /* תיקון קריאות במצב לילה */
        .night-mode .unit-button { background-color: #334155 !important; border-color: #475569 !important; }
        .night-mode .unit-text { color: #FFD700 !important; }
        .night-mode h3 { color: #94a3b8 !important; border-color: #334155 !important; }

        /* צבעי ערכות נושא */
        .border-sky-500 { border-color: #0ea5e9; } .bg-sky-50 { background-color: #f0f9ff; } .text-sky-900 { color: #0c4a6e; }
        .border-amber-500 { border-color: #f59e0b; } .bg-amber-50 { background-color: #fffbeb; } .text-amber-900 { color: #78350f; }
        .border-violet-500 { border-color: #8b5cf6; } .bg-violet-50 { background-color: #f5f3ff; } .text-violet-900 { color: #4c1d95; }
        .border-emerald-500 { border-color: #10b981; } .bg-emerald-50 { background-color: #ecfdf5; } .text-emerald-900 { color: #064e3b; }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 sm:p-8 bg-slate-50 min-h-screen">

    <header class="max-w-6xl mx-auto mb-10 flex items-center justify-between animate-fade-in">
        <button id="toggleNight" class="p-3 rounded-full hover:bg-slate-200 transition-colors text-2xl opacity-60 hover:opacity-100">☀️</button>

        <div class="flex items-center gap-4 flex-row-reverse">
            <img src="logo_inner.png" alt="Logo" class="w-20 sm:w-24 drop-shadow-md">
            <div class="text-left sm:text-right">
                <h1 class="text-3xl sm:text-5xl font-bold text-wa-yellow drop-shadow-sm">Word Adventure</h1>
                <p id="sub-title" class="text-gray-500 font-bold text-lg sm:text-xl">תרגול אוצר מילים בכיף 🦉</p>
            </div>
        </div>
    </header>

    <div id="loading" class="text-center font-bold text-blue-500 animate-pulse py-10 text-xl">טוען הרפתקאות...</div>
    
    <div id="content" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-10"></div>

    <script>
        const SHEET_ID = '1HJ1UDVuzqvWS66hprx8dSFqqoS0OVvZFGOGaRtyDPu8'; 
        const SHEET_NAME = 'Sheet1'; 

        async function loadData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                const data = rows.slice(1) 
                    .map(r => ({
                        book: r.c[0]?.v,
                        grade: r.c[1]?.v,
                        chapter: r.c[2]?.v,
                        unit: r.c[3]?.v,
                        link: r.c[4]?.v,
                        color: r.c[5]?.v || 'sky'
                    }))
                    .filter(item => item.book && item.book !== "Book" && item.link);

                renderBooks(data);
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerHTML = `<div class="text-red-500 font-bold text-center">שגיאה בחיבור לנתונים.</div>`;
            }
        }

        function renderBooks(data) {
            const content = document.getElementById('content');
            content.innerHTML = '';
            
            const books = [...new Set(data.map(d => d.book))];

            books.forEach(bookTitle => {
                const bookData = data.filter(d => d.book === bookTitle);
                const color = bookData[0].color; 
                
                let bookHtml = `
                    <div class="bg-white rounded-[2rem] shadow-lg border-t-4 border-${color}-500 flex flex-col h-full animate-fade-in overflow-hidden">
                        <div class="p-4 bg-${color}-50 flex justify-between items-center border-b border-slate-100 rounded-t-[2rem]">
                            <span class="bg-${color}-500 text-white px-3 py-1 rounded-full text-xs font-bold shadow-sm">${bookData[0].grade}</span>
                            <h2 class="text-xl font-bold text-${color}-900 eng-text" dir="ltr">${bookTitle}</h2>
                        </div>

                        <div class="p-5 flex-grow space-y-6">`;

                const chapters = [...new Set(bookData.map(d => d.chapter))];
                chapters.forEach(ch => {
                    bookHtml += `
                        <div>
                            <h3 class="font-bold text-slate-400 text-[10px] uppercase mb-3 border-b border-slate-50 pb-1 tracking-widest text-right">${ch || 'כללי'}</h3>
                            <div class="flex flex-col gap-2">`;
                    
                    const units = bookData.filter(d => d.chapter === ch);
                    units.forEach(u => {
                        bookHtml += `
                            <a href="${u.link}" target="_blank" class="unit-button w-full bg-slate-50 hover:bg-${color}-100 rounded-xl transition-all border border-slate-100 hover:border-${color}-300 group shadow-sm p-3 flex items-center justify-start px-4">
                                <span class="unit-text text-sm font-bold text-slate-700 group-hover:text-${color}-900 eng-text" dir="ltr">${u.unit}</span>
                            </a>`;
                    });
                    bookHtml += `</div></div>`;
                });
                
                bookHtml += `</div></div>`;
                content.innerHTML += bookHtml;
            });
        }

        document.getElementById('toggleNight').addEventListener('click', () => {
            document.body.classList.toggle('night-mode');
            const btn = document.getElementById('toggleNight');
            btn.innerText = document.body.classList.contains('night-mode') ? '🌙' : '☀️';
        });

        loadData();
    </script>
</body>
</html>
