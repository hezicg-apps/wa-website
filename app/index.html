<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Adventure - Play</title>
    <link rel="icon" type="image/png" href="../WA-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; transition: background 0.3s; }
        .eng-text { font-family: 'Fredoka One', cursive; direction: ltr; }
        .perspective-1000 { perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 2rem; }
        .card-back { transform: rotateY(180deg); }
        .night-mode { background-color: #0f172a !important; color: white; }
    </style>
</head>
<body class="bg-blue-50 flex flex-col items-center min-h-screen p-4">

    <div class="w-full max-w-2xl mb-4">
        <a href="../index.html" class="inline-flex items-center gap-2 text-blue-600 font-bold hover:underline">
            <span>🏠</span> חזרה לתפריט הספרים
        </a>
    </div>

    <div id="app" class="w-full max-w-2xl flex flex-col items-center">
        </div>

    <button id="toggleNight" class="fixed bottom-4 left-4 p-3 rounded-full bg-white shadow-lg text-2xl hover:scale-110 transition-transform">☀️</button>

    <script src="main.js"></script>
</body>
</html>
